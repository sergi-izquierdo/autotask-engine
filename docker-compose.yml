services:
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
      target: development
    ports:
      - "${API_PORT:-3001}:3001"
    volumes:
      - ./packages/api/src:/app/packages/api/src
      - ./packages/core/src:/app/packages/core/src
    env_file: .env
    environment:
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: packages/scheduler/Dockerfile
      target: development
    volumes:
      - ./packages/scheduler/src:/app/packages/scheduler/src
      - ./packages/core/src:/app/packages/core/src
    env_file: .env
    environment:
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
      target: development
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./packages/web/src:/app/packages/web/src
      - ./packages/core/src:/app/packages/core/src
    env_file: .env
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:${API_PORT:-3001}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  redis-data:
